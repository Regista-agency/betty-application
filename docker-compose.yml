services:
  bettyiad:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: bettyiad-prod
    restart: always
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - GOOGLE_SERVICE_ACCOUNT_PATH=/app/google_service_account.json
      - GOOGLE_SHEET_ID=${GOOGLE_SHEET_ID}
      - GCS_BUCKET=${GCS_BUCKET}
    volumes:
      # Service account JSON (read-only, never baked into image)
      - ./google_service_account.json:/app/google_service_account.json:ro
    networks:
      - traefik-proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=root_traefik-proxy
      - traefik.http.routers.bettyiad.rule=Host(`bettyiad.regista.com`)
      - traefik.http.routers.bettyiad.tls=true
      - traefik.http.routers.bettyiad.entrypoints=websecure
      - traefik.http.routers.bettyiad.tls.certresolver=mytlschallenge
      - traefik.http.services.bettyiad.loadbalancer.server.port=3000

networks:
  traefik-proxy:
    external: true
    name: root_traefik-proxy
