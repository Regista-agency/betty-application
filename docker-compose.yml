services:
  bettyiad-mongo:
    image: mongo:7
    container_name: bettyiad-mongo
    restart: always
    volumes:
      - bettyiad_mongo_data:/data/db
    networks:
      - bettyiad-network

  bettyiad:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: bettyiad-prod
    restart: always
    depends_on:
      - bettyiad-mongo
    environment:
      - MONGO_URL=mongodb://bettyiad-mongo:27017
      - DB_NAME=bettyiad
      - CORS_ORIGINS=https://bettyiad.regista.com
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - GOOGLE_SERVICE_ACCOUNT_PATH=/app/backend/google_service_account.json
      - GOOGLE_SHEET_ID=${GOOGLE_SHEET_ID}
      - GOOGLE_DRIVE_ROOT_FOLDER_ID=${GOOGLE_DRIVE_ROOT_FOLDER_ID}
      - GCS_BUCKET=${GCS_BUCKET}
      - FRONTEND_BUILD_DIR=/app/frontend_build
    volumes:
      # Mount service-account JSON as read-only (do not bake into image)
      - ./backend/google_service_account.json:/app/backend/google_service_account.json:ro
    networks:
      - bettyiad-network
      - traefik-proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=root_traefik-proxy
      - traefik.http.routers.bettyiad.rule=Host(`bettyiad.regista.com`)
      - traefik.http.routers.bettyiad.tls=true
      - traefik.http.routers.bettyiad.entrypoints=websecure
      - traefik.http.routers.bettyiad.tls.certresolver=mytlschallenge
      - traefik.http.services.bettyiad.loadbalancer.server.port=8001

volumes:
  bettyiad_mongo_data:

networks:
  bettyiad-network:
  traefik-proxy:
    external: true
    name: root_traefik-proxy
